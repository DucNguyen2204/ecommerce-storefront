<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <p-card header="Create Account" styleClass="w-full max-w-md">
    <form (ngSubmit)="submit()" class="flex flex-col gap-4">
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label for="firstName" class="text-sm font-medium">First Name</label>
          <input pInputText id="firstName" [(ngModel)]="firstName" name="firstName" class="w-full" required />
        </div>
        <div class="flex flex-col gap-1">
          <label for="lastName" class="text-sm font-medium">Last Name</label>
          <input pInputText id="lastName" [(ngModel)]="lastName" name="lastName" class="w-full" required />
        </div>
      </div>

      <div class="flex flex-col gap-1">
        <label for="email" class="text-sm font-medium">Email</label>
        <input
          id="email"
          pInputText
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="you@example.com"
          class="w-full"
          required
        />
      </div>

      <div class="flex flex-col gap-1">
        <label for="password" class="text-sm font-medium">Password</label>
        <p-password
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Password"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
        />
      </div>

      @if (error()) {
        <p-message severity="error" [text]="error()!" />
      }

      <p-button
        type="submit"
        label="Create Account"
        [loading]="loading()"
        [disabled]="!firstName || !lastName || !email || !password"
        styleClass="w-full"
      />

      <p class="text-center text-sm text-gray-500">
        Already have an account?
        <a routerLink="/auth/login" class="text-violet-600 hover:underline">Sign In</a>
      </p>
    </form>
  </p-card>
</div>
