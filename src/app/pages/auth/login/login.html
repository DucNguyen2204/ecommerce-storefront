<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-violet-50 to-indigo-100 px-4 py-12">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <a routerLink="/" class="inline-flex items-center gap-2 text-violet-600 font-bold text-2xl">
        <i class="pi pi-shopping-bag text-3xl"></i>
        MyStore
      </a>
    </div>

    <p-card styleClass="shadow-xl rounded-2xl">
      <div class="mb-6 mx-2">
        <h2 class="text-2xl font-bold text-gray-900">Welcome back</h2>
        <p class="text-sm text-gray-500 mt-1">Sign in to continue to your account</p>
      </div>

      <form (ngSubmit)="submit()" class="flex flex-col gap-5 mx-2">

        <div class="flex flex-col gap-1.5">
          <label for="email" class="text-xs font-semibold text-gray-500">
            Email
          </label>
          <input
            id="email"
            pInputText
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="you@example.com"
            class="w-full"
            required
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="password" class="text-xs font-semibold text-gray-500">
            Password
          </label>
          <p-password
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Your password"
            [feedback]="false"
            [toggleMask]="true"
            styleClass="w-full"
            inputStyleClass="w-full"
          />
        </div>

        @if (error()) {
          <p-message severity="error" [text]="error()!" />
        }

        <p-button
          type="submit"
          label="Sign In"
          icon="pi pi-sign-in"
          [loading]="loading()"
          [disabled]="!email || !password"
          styleClass="w-full mt-1"
        />

        <div class="bg-violet-50 border border-violet-200 rounded-lg px-4 py-3 text-sm text-violet-700">
          <span class="font-semibold">Demo credentials:</span>
          demo&#64;example.com / password
        </div>

        <p class="text-center text-sm text-gray-500">
          Don't have an account?
          <a routerLink="/auth/register" class="text-violet-600 font-medium hover:underline">Register</a>
        </p>

      </form>
    </p-card>
  </div>
</div>
