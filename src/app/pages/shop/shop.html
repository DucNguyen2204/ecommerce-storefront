<div class="container mx-auto px-4 py-8">
  <h1 class="text-2xl font-bold mb-6">Shop</h1>

  <div class="flex flex-col md:flex-row gap-4 mb-8">
    <p-select
      [options]="categories()"
      [(ngModel)]="selectedCategory"
      optionLabel="name"
      placeholder="All Categories"
      [showClear]="true"
      (onChange)="onCategoryChange()"
      class="w-full md:w-56"
    />
    <input
      pInputText
      [(ngModel)]="search"
      placeholder="Search products..."
      (keyup.enter)="onSearch()"
      class="flex-1"
    />
    <p-button label="Search" icon="pi pi-search" (onClick)="onSearch()" />
  </div>

  @if (loading()) {
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      @for (_ of skeletons; track $index) {
        <p-skeleton height="280px" />
      }
    </div>
  } @else if (page()?.content?.length === 0) {
    <p class="text-center text-gray-500 py-20">No products found.</p>
  } @else {
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      @for (product of page()!.content; track product.id) {
        <div class="border rounded-lg p-4 flex flex-col gap-3 hover:shadow-md transition-shadow">
          <div class="bg-gray-100 rounded h-40 flex items-center justify-center text-gray-400 text-sm">
            No image
          </div>
          <a [routerLink]="['/shop', product.id]" class="font-semibold hover:text-violet-600 line-clamp-2">
            {{ product.name }}
          </a>
          <span class="text-gray-500 text-sm">{{ product.category.name }}</span>
          <div class="flex items-center justify-between mt-auto">
            <span class="text-lg font-bold">\${{ product.price | number:'1.2-2' }}</span>
            <p-button
              icon="pi pi-cart-plus"
              size="small"
              [loading]="addingToCart() === product.id"
              (onClick)="addToCart(product)"
            />
          </div>
        </div>
      }
    </div>

    <p-paginator
      [rows]="pageSize"
      [totalRecords]="page()!.totalElements"
      [first]="currentPage * pageSize"
      (onPageChange)="onPageChange($event)"
      class="mt-8"
    />
  }
</div>
